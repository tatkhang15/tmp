<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <p id="message" class="message-box hidden"></p>
  <div class="container">
    <h1>Quên mật khẩu</h1>
    <div class="panel">
      <label for="reset-email">Nhập email đã đăng ký</label>
      <input type="email" id="reset-email" autocomplete="off">
      <button id="send-code-button" type="button">Gửi mã về email</button>
    </div>
    <div id="code-box" class="panel hidden">
      <label for="reset-code">Nhập mã 6 số</label>
      <input type="text" id="reset-code" maxlength="6" autocomplete="off">
      <button id="check-code-button" type="button">Xác nhận mã</button>
    </div>
    <form id="reset-form" class="panel hidden" autocomplete="off">
      <label for="new-password">Mật khẩu mới</label>
      <input type="password" id="new-password" autocomplete="new-password">
      <label for="confirm-new-password">Nhập lại mật khẩu mới</label>
      <input type="password" id="confirm-new-password" autocomplete="new-password">
      <button type="submit">Cập nhật mật khẩu</button>
    </form>
    <a href="login.html" class="back-button">Quay lại trang đăng nhập</a>
  </div>
  <script>
    resetEmail = document.getElementById("reset-email");
    sendCodeButton = document.getElementById("send-code-button");
    codeBox = document.getElementById("code-box");
    resetCode = document.getElementById("reset-code");
    checkCodeButton = document.getElementById("check-code-button");
    resetForm = document.getElementById("reset-form");
    newPassword = document.getElementById("new-password");
    confirmNewPassword = document.getElementById("confirm-new-password");
    message = document.getElementById("message");
    sendCodeButton.addEventListener("click", () => {
      oldEmail = localStorage.getItem("email");
      if (resetEmail.value == "") {
        message.innerHTML = "Bạn chưa nhập email";
        message.className = "message-box error";
        return;
      }
      if (resetEmail.value != oldEmail) {
        message.innerHTML = "Email này không có trong dữ liệu";
        message.className = "message-box error";
        return;
      }
      code = Math.floor(100000 + Math.random() * 900000).toString();
      localStorage.setItem("resetCode", code);
      localStorage.setItem("resetEmail", resetEmail.value);
      codeBox.className = "panel";
      subject = encodeURIComponent("Mã khôi phục mật khẩu");
      body = encodeURIComponent("Mã xác nhận 6 số của bạn là: " + code);
      gmailUrl = "https://mail.google.com/mail/?view=cm&fs=1&to=" + resetEmail.value + "&su=" + subject + "&body=" + body;
      window.open(gmailUrl, "_blank");
      message.innerHTML = "Đã tạo mã và mở Gmail để bạn gửi email";
      message.className = "message-box success";
    });
    checkCodeButton.addEventListener("click", () => {
      oldCode = localStorage.getItem("resetCode");
      if (resetCode.value != oldCode) {
        message.innerHTML = "Mã xác nhận không đúng";
        message.className = "message-box error";
        return;
      }
      resetForm.className = "panel";
      message.innerHTML = "Mã đúng, hãy cập nhật mật khẩu mới";
      message.className = "message-box success";
    });
    resetForm.addEventListener("submit", (e) => {
      e.preventDefault();
      if (newPassword.value == "" || confirmNewPassword.value == "") {
        message.innerHTML = "Bạn chưa nhập đủ mật khẩu mới";
        message.className = "message-box error";
        return;
      }
      if (newPassword.value != confirmNewPassword.value) {
        message.innerHTML = "Mật khẩu mới nhập lại không giống nhau";
        message.className = "message-box error";
        return;
      }
      localStorage.setItem("password", newPassword.value);
      localStorage.removeItem("resetCode");
      localStorage.removeItem("resetEmail");
      message.innerHTML = "Cập nhật mật khẩu thành công";
      message.className = "message-box success";
      resetForm.reset();
    });
  </script>
</body>
</html>
